<!doctype html>
<meta charset="utf-8">
<title>add-while-open — Guided arc</title>
<!-- The new tile flies from the hub centre on a shallow arc to its slot; existing tiles stay put. -->
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1114; color:#e6e8eb; font:14px 'Segoe UI', system-ui, sans-serif; }
  main { width:min(680px, calc(100vw - 32px)); }
  header { display:flex; align-items:end; gap:12px; margin-bottom:14px; }
  h1 { margin:0; font-size:20px; } .meta { margin-left:auto; color:#8b93a1; font-size:12px; }
  .stage { height:220px; position:relative; background:#161a1f; border:1px solid #2c313a; border-radius:10px; }
  .hub { position:absolute; left:50%; top:50%; width:40px; height:40px; margin:-20px 0 0 -20px; border-radius:50%; background:#1e2128; border:1px solid #3a4150; }
  .rim { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; gap:16px; }
  .tile { width:64px; height:64px; display:grid; place-items:center; border:1px solid #3a4150; border-radius:16px; background:#1e2128; color:#c2c7cf; font-weight:700; }
  .tile.new { border-color:#4fd1c5; color:#4fd1c5; }
  footer { display:flex; align-items:center; gap:14px; margin-top:14px; color:#8b93a1; }
  button { min-height:34px; padding:8px 14px; border:1px solid #4fd1c5; border-radius:8px; background:#0f1114; color:#4fd1c5; cursor:pointer; }
</style>
<main>
  <header><div><h1>Guided arc</h1><div>New tile flies from the orb centre on an arc to its slot; existing tiles stay put</div></div><span class="meta">280ms</span></header>
  <div class="stage" id="stage">
    <div class="hub"></div>
    <div class="rim"><div class="tile">A</div><div class="tile">B</div><div class="tile new" id="n">N</div></div>
  </div>
  <footer><button id="replay" type="button">Replay</button><span>Links the drop to the tile it became. Same feel as pin-arrival.</span></footer>
</main>
<script>
  const spec = { keyframes:[
    { opacity:0, transform:'translate(-150px, 20px) scale(.5)' },
    { opacity:1, transform:'translate(-75px, -26px) scale(1.05)', offset:.5 },
    { opacity:1, transform:'translate(0, 0) scale(1)' }
  ], duration:280, easing:'cubic-bezier(.22,.7,.2,1)' };
  let anim;
  function play() { if (anim) anim.cancel(); anim = document.getElementById('n').animate(spec.keyframes, { duration:spec.duration, easing:spec.easing }); }
  document.getElementById('replay').addEventListener('click', play);
  document.getElementById('stage').addEventListener('click', play);
  setTimeout(play, 150);
</script>
