<!doctype html>
<meta charset="utf-8">
<title>add-while-open — Staggered reflow</title>
<!-- Existing tiles gently shift to open a gap, then the new tile drops into it. -->
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1114; color:#e6e8eb; font:14px 'Segoe UI', system-ui, sans-serif; }
  main { width:min(680px, calc(100vw - 32px)); }
  header { display:flex; align-items:end; gap:12px; margin-bottom:14px; }
  h1 { margin:0; font-size:20px; } .meta { margin-left:auto; color:#8b93a1; font-size:12px; }
  .stage { height:200px; position:relative; background:#161a1f; border:1px solid #2c313a; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:16px; }
  .tile { width:64px; height:64px; display:grid; place-items:center; border:1px solid #3a4150; border-radius:16px; background:#1e2128; color:#c2c7cf; font-weight:700; }
  .tile.new { border-color:#4fd1c5; color:#4fd1c5; }
  footer { display:flex; align-items:center; gap:14px; margin-top:14px; color:#8b93a1; }
  button { min-height:34px; padding:8px 14px; border:1px solid #4fd1c5; border-radius:8px; background:#0f1114; color:#4fd1c5; cursor:pointer; }
</style>
<main>
  <header><div><h1>Staggered reflow</h1><div>Existing tiles slide a little to open a gap, then the new tile drops in</div></div><span class="meta">210ms, 55ms stagger</span></header>
  <div class="stage" id="stage">
    <div class="tile" id="a">A</div><div class="tile" id="b">B</div><div class="tile new" id="n">N</div>
  </div>
  <footer><button id="replay" type="button">Replay</button><span>Explains the reflow, but existing tiles do move.</span></footer>
</main>
<script>
  function play() {
    const shift = [{transform:'translateX(0)'},{transform:'translateX(-10px)'},{transform:'translateX(0)'}];
    document.getElementById('a').animate(shift, { duration:210, easing:'cubic-bezier(.25,.75,.25,1)' });
    document.getElementById('b').animate(shift, { duration:210, delay:55, easing:'cubic-bezier(.25,.75,.25,1)' });
    document.getElementById('n').animate([{opacity:0, transform:'translateY(-14px) scale(.7)'},{opacity:1, transform:'translateY(0) scale(1)'}], { duration:210, delay:110, easing:'cubic-bezier(.25,.75,.25,1)' });
  }
  document.getElementById('replay').addEventListener('click', play);
  document.getElementById('stage').addEventListener('click', play);
  setTimeout(play, 150);
</script>
