<!doctype html>
<meta charset="utf-8">
<title>wheel-overflow · Concentric columns</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
         background: #0f1420; color: #e6ebf5; font: 14px system-ui, 'Segoe UI', sans-serif; }
  main { width: min(680px, calc(100vw - 32px)); }
  header { display: flex; align-items: end; gap: 12px; margin-bottom: 12px; }
  h1 { margin: 0; font-size: 22px; }
  .sub { color: #93a1b8; font-size: 12px; margin-top: 4px; max-width: 560px; }
  .meta { margin-left: auto; color: #6d7c95; font-size: 12px; white-space: nowrap; }
  .stage { position: relative; aspect-ratio: 1; background: #0d1017;
           border: 1px solid #26314a; border-radius: 8px; overflow: hidden; }
  .stage canvas { width: 100%; height: 100%; display: block; }
  footer { display: flex; align-items: center; gap: 16px; margin-top: 12px; color: #93a1b8; flex-wrap: wrap; }
  label { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  select, input[type=range] { accent-color: #4da3ff; }
  .read { color: #7cc4ff; font-weight: 600; }
</style>
<main>
  <header>
    <div>
      <h1>4 · Concentric columns</h1>
      <div class="sub">Строгие радиальные колонны: пары тайлов стоят на одной спице (внутренний +
        внешний), последний нечётный — только внешний. Наведение подсвечивает всю колонну целиком:
        обе плитки и спицу. Два чётких обода-полосы.</div>
    </div>
    <span class="meta">колонны · подсветка всей спицы</span>
  </header>
  <div class="stage"><canvas id="cv"></canvas></div>
  <footer>
    <label>Тема
      <select id="theme">
        <option>Dark</option><option>Fluent</option><option>Light</option><option>Neon</option>
      </select>
    </label>
    <label>Целей <input id="count" type="range" min="5" max="16" value="12">
      <span class="read" id="cread">12</span>
    </label>
    <span id="info" class="read"></span>
  </footer>
</main>
<script src="wheel2.js"></script>
<script>
  const SIZE = 600, C = SIZE / 2, SINGLE = 9;
  let lastInfo = "";

  function layout(n) {
    if (n <= SINGLE) {
      const s = OV.ring(n, 170, -Math.PI / 2, C, C).map(p => ({ ...p, size: 64 }));
      lastInfo = `одно кольцо · ${n} · окно 460`;
      return { rings: [{ r: 170, width: 34 }], slots: s };
    }
    const cols = Math.ceil(n / 2), inR = 150, outR = 250;
    const slots = [];
    for (let i = 0; i < n; i++) {
      const c = Math.floor(i / 2);
      const a = -Math.PI / 2 + (c * 2 * Math.PI) / cols;
      const r = i % 2 === 0 ? inR : outR;
      slots.push({ a, r, x: C + r * Math.cos(a), y: C + r * Math.sin(a), size: 64 });
    }
    lastInfo = `${cols} колонн · окно ${SIZE}`;
    return { rings: [{ r: inR, width: 34 }, { r: outR, width: 34 }], slots };
  }

  const cv = document.getElementById("cv");
  const w = new OV.Wheel(cv, { size: SIZE, theme: "Dark", layout, tiles: OV.makeTiles(12), column: true, });
  const info = document.getElementById("info");
  setInterval(() => { if (lastInfo !== info.textContent) info.textContent = lastInfo; }, 120);
  document.getElementById("theme").addEventListener("change", e => {
    w.setTheme(e.target.value);
    document.querySelector(".stage").style.background = OV.THEMES[e.target.value].stage;
  });
  document.getElementById("count").addEventListener("input", e => {
    document.getElementById("cread").textContent = e.target.value;
    w.setCount(+e.target.value);
  });
</script>
