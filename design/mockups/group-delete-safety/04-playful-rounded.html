<!doctype html>
<meta charset="utf-8">
<title>Group delete safety — Concept D: Inline two-step</title>
<!-- Concept D: no modal; the editor's Delete button arms itself and needs a second, deliberate click. -->
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1114; color:#e6e8eb;
         font:14px 'Segoe UI', system-ui, sans-serif; }
  .cap { position:fixed; top:14px; left:16px; font-size:12px; color:#6b7280; }
  .editor { width:420px; background:#1e2128; border:1px solid #2c313a; border-radius:12px; padding:20px; box-shadow:0 18px 50px rgba(0,0,0,.5); }
  h1 { margin:0 0 4px; font-size:15px; } .sub { color:#8b93a1; margin:0 0 18px; font-size:12px; }
  .field { background:#14161a; border:1px solid #2c313a; border-radius:8px; padding:10px 12px; margin-bottom:12px; color:#c2c7cf; }
  .foot { display:flex; align-items:center; gap:10px; margin-top:8px; }
  .spacer { margin-left:auto; }
  button { min-height:34px; padding:8px 16px; border-radius:8px; border:1px solid #3a4150; background:#262b33; color:#e6e8eb; cursor:pointer; font-size:13px; }
  .save { background:#4fd1c5; border-color:#4fd1c5; color:#0f1114; }
  .armed { background:#c0392b; border-color:#c0392b; color:#fff; animation:pulse 1s ease-in-out infinite; }
  @keyframes pulse { 50% { box-shadow:0 0 0 4px rgba(192,57,43,.3); } }
  .hint { font-size:12px; color:#ffb454; }
</style>
<div class="cap">Concept D — Inline two-step delete (no modal)</div>
<div class="editor">
  <h1>Edit group — “Work”</h1>
  <p class="sub">7 targets inside</p>
  <div class="field">Name: Work</div>
  <div class="field">Shortcut code: 12</div>
  <div class="foot">
    <button class="armed">Confirm — delete group &amp; 7 items</button>
    <span class="hint">Click again to confirm</span>
    <span class="spacer"></span>
    <button class="save">Save</button>
  </div>
</div>
