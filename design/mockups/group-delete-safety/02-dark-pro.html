<!doctype html>
<meta charset="utf-8">
<title>Group delete safety — Concept B: Keep-children choice</title>
<!-- Concept B: confirmation that also offers a non-destructive path (move children to root). -->
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1114; color:#e6e8eb;
         font:14px 'Segoe UI', system-ui, sans-serif; }
  .cap { position:fixed; top:14px; left:16px; font-size:12px; color:#6b7280; }
  .scrim { position:fixed; inset:0; background:rgba(0,0,0,.5); }
  .dialog { position:relative; width:400px; background:#1e2128; border:1px solid #2c313a; border-radius:12px;
            box-shadow:0 18px 50px rgba(0,0,0,.55); padding:22px; }
  h1 { margin:0 0 12px; font-size:16px; }
  p { margin:0 0 14px; line-height:1.5; color:#c2c7cf; } b { color:#e6e8eb; }
  .opt { display:flex; gap:12px; align-items:flex-start; padding:12px; border:1px solid #2c313a; border-radius:9px; margin-bottom:10px; cursor:pointer; }
  .opt.sel { border-color:#4fd1c5; background:#17262a; }
  .dot { width:16px; height:16px; border-radius:50%; border:2px solid #4fd1c5; margin-top:2px; flex:none; }
  .opt.sel .dot { background:#4fd1c5; }
  .opt small { display:block; color:#8b93a1; margin-top:3px; }
  .row { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
  button { min-height:34px; padding:8px 16px; border-radius:8px; border:1px solid #3a4150; background:#262b33; color:#e6e8eb; cursor:pointer; font-size:13px; }
  .primary { background:#4fd1c5; border-color:#4fd1c5; color:#0f1114; }
</style>
<div class="cap">Concept B — Confirm with a safe alternative</div>
<div class="scrim"></div>
<div class="dialog">
  <h1>Delete the “Work” group</h1>
  <p>It holds <b>7 targets</b>. Choose what happens to them:</p>
  <div class="opt sel"><span class="dot"></span><div>Keep the targets, delete only the group<small>The 7 targets move out to the main wheel</small></div></div>
  <div class="opt"><span class="dot"></span><div>Delete the group and all 7 targets<small>Everything inside is removed</small></div></div>
  <div class="row">
    <button>Cancel</button>
    <button class="primary">Continue</button>
  </div>
</div>
