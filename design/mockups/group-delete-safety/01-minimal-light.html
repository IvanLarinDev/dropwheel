<!doctype html>
<meta charset="utf-8">
<title>Group delete safety — Concept A: Confirm dialog</title>
<!-- Concept A: a plain modal confirmation before a group with children is deleted. -->
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1114; color:#e6e8eb;
         font:14px 'Segoe UI', system-ui, sans-serif; }
  .cap { position:fixed; top:14px; left:16px; font-size:12px; color:#6b7280; }
  .scrim { position:fixed; inset:0; background:rgba(0,0,0,.5); }
  .dialog { position:relative; width:380px; background:#1e2128; border:1px solid #2c313a; border-radius:12px;
            box-shadow:0 18px 50px rgba(0,0,0,.55); padding:22px; }
  h1 { margin:0 0 12px; font-size:16px; }
  p { margin:0 0 8px; line-height:1.5; color:#c2c7cf; } b { color:#e6e8eb; }
  .warn { color:#ffb454; }
  .row { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }
  button { min-height:34px; padding:8px 16px; border-radius:8px; border:1px solid #3a4150; background:#262b33; color:#e6e8eb; cursor:pointer; font-size:13px; }
  .danger { background:#c0392b; border-color:#c0392b; color:#fff; }
</style>
<div class="cap">Concept A — Confirmation dialog (simplest)</div>
<div class="scrim"></div>
<div class="dialog">
  <h1>Delete the “Work” group?</h1>
  <p>It holds <b>7 targets</b> — folders, apps and their sort rules.</p>
  <p class="warn">They are removed together with the group.</p>
  <div class="row">
    <button>Cancel</button>
    <button class="danger">Delete group &amp; 7 items</button>
  </div>
</div>
