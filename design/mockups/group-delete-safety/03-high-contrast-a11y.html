<!doctype html>
<meta charset="utf-8">
<title>Group delete safety — Concept C: Undo toast, no dialog</title>
<!-- Concept C: no modal; delete immediately but offer a prominent, timed Undo (reuses the app toast). -->
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:#0f1114; color:#e6e8eb; font:14px 'Segoe UI', system-ui, sans-serif; }
  .cap { position:fixed; top:14px; left:16px; font-size:12px; color:#6b7280; }
  .wheel { position:fixed; inset:0; display:grid; place-items:center; opacity:.5; }
  .orb { width:60px; height:60px; border-radius:50%; background:#1e2128; border:1px solid #3a4150; }
  .toast { position:fixed; left:50%; bottom:60px; transform:translateX(-50%); display:flex; align-items:center; gap:16px;
           background:#1e2128; border:1px solid #2c313a; border-radius:12px; padding:14px 18px; box-shadow:0 14px 40px rgba(0,0,0,.5); }
  .toast b { color:#e6e8eb; } .toast span { color:#c2c7cf; }
  .undo { color:#4fd1c5; font-weight:600; text-decoration:underline; cursor:pointer; }
  .bar { position:absolute; left:0; bottom:0; height:3px; width:70%; background:#4fd1c5; border-radius:0 0 12px 12px; }
</style>
<div class="cap">Concept C — Immediate delete + Undo toast (no modal)</div>
<div class="wheel"><div class="orb"></div></div>
<div class="toast">
  <span>🗑 Deleted <b>“Work”</b> group and 7 targets</span>
  <span class="undo">Undo</span>
  <div class="bar"></div>
</div>
