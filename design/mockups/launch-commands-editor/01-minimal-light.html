<!doctype html>
<meta charset="utf-8">
<title>Launch commands editor - Compact table</title>
<style>
  :root { --bg:#f6f7f9; --panel:#ffffff; --line:#d8dde6; --text:#171b22; --muted:#667085; --accent:#2563eb; --bad:#b42318; --ok:#027a48; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font:13px "Segoe UI", system-ui, sans-serif; display:grid; place-items:center; }
  .window { width:760px; background:var(--panel); border:1px solid var(--line); box-shadow:0 18px 60px rgba(15,23,42,.14); }
  header { height:46px; display:flex; align-items:center; padding:0 14px; border-bottom:1px solid var(--line); gap:10px; }
  h1 { font-size:15px; margin:0; font-weight:600; }
  .sub { color:var(--muted); margin-left:auto; font-size:12px; }
  main { padding:14px; }
  .toolbar { display:flex; gap:8px; margin-bottom:10px; align-items:center; }
  button { border:1px solid var(--line); background:#fff; color:var(--text); height:30px; padding:0 11px; border-radius:6px; font:inherit; }
  button.primary { background:var(--accent); color:white; border-color:var(--accent); margin-left:auto; }
  table { width:100%; border-collapse:collapse; border:1px solid var(--line); table-layout:fixed; }
  th { background:#f9fafb; text-align:left; color:#475467; font-weight:600; height:34px; border-bottom:1px solid var(--line); padding:0 10px; }
  td { height:42px; border-bottom:1px solid var(--line); padding:6px 10px; vertical-align:middle; }
  tr:last-child td { border-bottom:0; }
  .ext { width:150px; }
  .file { width:165px; }
  .actions { width:92px; text-align:right; }
  .chip { display:inline-block; border:1px solid #bfd0ff; background:#eef4ff; color:#1d4ed8; padding:2px 7px; border-radius:999px; margin-right:4px; }
  input { width:100%; height:28px; border:1px solid var(--line); border-radius:5px; padding:0 8px; font:12px Consolas, monospace; }
  .status { display:flex; gap:14px; margin-top:10px; color:var(--muted); font-size:12px; }
  .ok { color:var(--ok); }
  .bad { color:var(--bad); }
  footer { display:flex; justify-content:flex-end; gap:8px; border-top:1px solid var(--line); padding:12px 14px; background:#fbfcfd; }
</style>
<section class="window">
  <header>
    <h1>Launch commands</h1>
    <span class="sub">Settings / Run targets</span>
  </header>
  <main>
    <div class="toolbar">
      <button>Add command</button>
      <button>Restore defaults</button>
      <button>Test selected</button>
      <button class="primary">Save</button>
    </div>
    <table>
      <thead><tr><th class="ext">Extensions</th><th class="file">Program</th><th>Arguments</th><th class="actions"></th></tr></thead>
      <tbody>
        <tr><td><span class="chip">.ps1</span></td><td><input value="powershell.exe"></td><td><input value='-NoProfile -ExecutionPolicy Bypass -File "{target}" {files}'></td><td class="actions"><button>...</button></td></tr>
        <tr><td><span class="chip">.py</span><span class="chip">.pyw</span></td><td><input value="py"></td><td><input value='"{target}" {files}'></td><td class="actions"><button>...</button></td></tr>
        <tr><td><span class="chip">.jar</span></td><td><input value="java"></td><td><input value='-jar "{target}" {files}'></td><td class="actions"><button>...</button></td></tr>
        <tr><td><input value=".foo"></td><td><input value="runner.exe"></td><td><input value='--script "{target}" -- {files}'></td><td class="actions"><button>...</button></td></tr>
      </tbody>
    </table>
    <div class="status"><span class="ok">4 commands valid</span><span>{target} and {files} available in every argument field</span><span class="bad">1 program not found in PATH</span></div>
  </main>
  <footer><button>Cancel</button><button class="primary">Apply</button></footer>
</section>
