<!doctype html>
<meta charset="utf-8">
<title>orb-ghost-capture - Two-step confirm</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1420; color:#e6ebf5; font:14px system-ui,'Segoe UI',sans-serif; }
  main { width:min(760px,calc(100vw - 32px)); }
  header { display:flex; align-items:end; gap:12px; margin-bottom:12px; }
  h1 { margin:0; font-size:22px; } .sub { color:#93a1b8; font-size:12px; margin-top:4px; }
  .meta { margin-left:auto; color:#6d7c95; font-size:12px; }
  .stage { position:relative; height:470px; background:#151b29; border:1px solid #26314a; border-radius:8px; overflow:hidden; }
  footer { display:flex; align-items:center; gap:14px; margin-top:12px; color:#93a1b8; }
  button { min-height:36px; padding:8px 14px; border:1px solid #2f66d6; border-radius:6px; background:#2563eb; color:#fff; cursor:pointer; }
  .phase { color:#7cc4ff; font-weight:600; }
</style>
<main>
  <header>
    <div><h1>3 · Two-step confirm</h1><div class="sub">The ghost returns and the orb pulses a confirming ring — a beat — then the wheel opens and the tile arrives. Reads as "got it, now here it is".</div></div>
    <span class="meta">beat before open</span>
  </header>
  <div class="stage"><svg id="wheel" viewBox="0 0 460 460" width="100%" height="100%"></svg></div>
  <footer><button id="replay" type="button">Replay</button><span class="phase" id="phase">…</span></footer>
</main>
<script>
const NS = 'http://www.w3.org/2000/svg';
const CX = 230, CY = 230, RING = 170, TILE = 60;
const EXISTING = ['Downloads', 'Docs', 'Desktop', 'Pictures'];
const FILE = { x: 384, y: 372 };
const EASE = 'cubic-bezier(.2,.8,.2,1)';
const svg = document.getElementById('wheel');
const phase = document.getElementById('phase');

function el(name, attrs) { const n = document.createElementNS(NS, name); for (const [k, v] of Object.entries(attrs)) n.setAttribute(k, v); return n; }
function slot(i, c) { const a = (-90 + i * (360 / c)) * Math.PI / 180; return { x: CX + RING * Math.cos(a), y: CY + RING * Math.sin(a) }; }
function tile(label, pinned) {
  const g = el('g', {});
  g.appendChild(el('rect', { x: -TILE / 2, y: -TILE / 2, width: TILE, height: TILE, rx: 15, fill: pinned ? '#1d3a5f' : '#1b2436', stroke: pinned ? '#7cc4ff' : '#33415c', 'stroke-width': pinned ? 2 : 1.2 }));
  const t = el('text', { y: 4, 'text-anchor': 'middle', fill: pinned ? '#cfe6ff' : '#9fb0c9', 'font-size': 10 }); t.textContent = label; g.appendChild(t);
  return g;
}
function orbShape(r) { const g = el('g', {}); g.appendChild(el('circle', { cx: 0, cy: 0, r, fill: '#22304a', stroke: '#3f5170', 'stroke-width': 1 })); g.appendChild(el('circle', { cx: 0, cy: 0, r: r * 0.4, fill: '#7cc4ff' })); return g; }
function move(n, x, y, s) { n.setAttribute('transform', `translate(${x},${y}) scale(${s ?? 1})`); }
function wait(ms) { return new Promise((r) => setTimeout(r, ms)); }
function tr(x, y, s) { return { transform: `translate(${x}px,${y}px) scale(${s})` }; }

function build() {
  svg.replaceChildren();
  const file = el('g', {});
  file.appendChild(el('rect', { x: FILE.x - 16, y: FILE.y - 20, width: 32, height: 40, rx: 4, fill: '#243247', stroke: '#3f5170' }));
  file.appendChild(el('rect', { x: FILE.x - 8, y: FILE.y - 10, width: 16, height: 3, rx: 1.5, fill: '#7cc4ff' }));
  file.appendChild(el('rect', { x: FILE.x - 8, y: FILE.y - 3, width: 16, height: 3, rx: 1.5, fill: '#4a5a74' }));
  svg.appendChild(file);
  const ringLayer = el('g', {}); svg.appendChild(ringLayer);
  const tileLayer = el('g', {}); svg.appendChild(tileLayer);
  const orb = orbShape(26); move(orb, CX, CY, 1); svg.appendChild(orb);
  return { ringLayer, tileLayer };
}

async function play() {
  const { ringLayer, tileLayer } = build();

  phase.textContent = 'Released over the file — the ghost carries it back';
  const ghost = orbShape(20); ghost.setAttribute('opacity', 0.92); move(ghost, FILE.x, FILE.y, 1); svg.appendChild(ghost);
  ghost.animate([tr(FILE.x, FILE.y, 1), tr(CX, CY, 0.6)], { duration: 180, easing: EASE, fill: 'forwards' });
  await wait(180); ghost.remove();

  phase.textContent = 'A confirming pulse — captured';
  const pulse = el('circle', { cx: CX, cy: CY, r: 26, fill: 'none', stroke: '#7cc4ff', 'stroke-width': 2 });
  ringLayer.appendChild(pulse);
  pulse.animate([{ r: 26, opacity: 1 }, { r: 52, opacity: 0 }], { duration: 320, easing: EASE, fill: 'forwards' });
  await wait(300);

  phase.textContent = 'The orb opens the wheel';
  const total = EXISTING.length + 1;
  const ring = el('circle', { cx: CX, cy: CY, r: RING, fill: 'none', stroke: '#222c42', 'stroke-width': 28, opacity: 0 }); ringLayer.appendChild(ring);
  ring.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 200, fill: 'forwards' });
  const old = EXISTING.map((label, i) => { const n = tile(label, false); const s = slot(i + 1, total); move(n, s.x, s.y, 1); tileLayer.appendChild(n);
    n.animate([tr(CX, CY, 0.4), tr(s.x, s.y, 1)], { duration: 200, delay: i * 15, easing: EASE, fill: 'forwards' });
    n.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 150, delay: i * 15, fill: 'forwards' }); return n; });
  await wait(280);

  phase.textContent = 'The captured tile arrives first, next to the hub';
  const fresh = tile('Sorted', true); const s = slot(0, total); tileLayer.appendChild(fresh);
  const mx = (CX + s.x) / 2, my = (CY + s.y) / 2, dx = mx - CX, dy = my - CY, len = Math.hypot(dx, dy) || 1;
  const midx = mx + dx / len * 42, midy = my + dy / len * 42;
  fresh.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 120 });
  fresh.animate([tr(CX, CY, 0.5), tr(midx, midy, 0.9), tr(s.x, s.y, 1)], { duration: 200, easing: EASE, fill: 'forwards' });
  await wait(440);
  phase.textContent = 'Pinned. It sits first on the rim.';
}

document.getElementById('replay').addEventListener('click', play);
play();
</script>
