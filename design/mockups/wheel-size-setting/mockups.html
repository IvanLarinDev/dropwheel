<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Wheel size — ползунок размера колеса</title>
<style>
  body { background:#12161c; color:#c9d2de; font-family:Segoe UI, sans-serif; margin:0; padding:24px; }
  h1 { font-size:18px; font-weight:500; margin:0 0 4px; }
  .sub { color:#8a96a8; font-size:13px; margin:0 0 18px; }
  .stage { height:320px; display:flex; align-items:center; justify-content:center; background:#1a1f27; border-radius:12px; overflow:hidden; }
</style>
</head>
<body>
<h1>Wheel size — ползунок размера колеса</h1>
<p class="sub">Единственный элемент: слайдер в секции Appearance (диапазон 0.8–1.5, шаг 0.05). Двигай — колесо масштабируется целиком.</p>
<div style="display:flex;align-items:center;gap:12px;margin:0 0 8px;max-width:420px;">
  <label style="font-size:14px;color:#8a96a8;min-width:74px;">Wheel size</label>
  <input type="range" id="sc" min="0.8" max="1.5" step="0.05" value="1.0" style="flex:1;">
  <span id="scv" style="font-size:14px;font-weight:500;min-width:38px;">1.00x</span>
</div>
<div style="font-size:12px;color:#6b7686;margin-bottom:16px;">Рядом с прозрачностью орба и скоростью анимации.</div>
<div class="stage">
  <div id="wheel" style="position:relative;width:220px;height:220px;transform-origin:center center;transition:transform .12s ease-out;">
    <div style="position:absolute;left:32px;top:32px;width:156px;height:156px;border-radius:50%;border:12px solid #3a424e;box-sizing:border-box;"></div>
    <div style="position:absolute;left:96px;top:96px;width:28px;height:28px;border-radius:50%;background:#8a96a8;"></div>
  </div>
</div>
<script>
(function(){
  const CX=110, CY=110, R=78, N=6, T=30;
  const wheel=document.getElementById('wheel');
  for(let i=0;i<N;i++){
    const a=(-90+i*(360/N))*Math.PI/180;
    const d=document.createElement('div');
    d.style.cssText='position:absolute;width:'+T+'px;height:'+T+'px;border-radius:7px;background:rgba(111,168,255,.18);border:1.5px solid #6fa8ff;left:'+(CX+R*Math.cos(a)-T/2)+'px;top:'+(CY+R*Math.sin(a)-T/2)+'px;';
    wheel.appendChild(d);
  }
  const sc=document.getElementById('sc'), scv=document.getElementById('scv');
  function apply(){ const v=parseFloat(sc.value); wheel.style.transform='scale('+v+')'; scv.textContent=v.toFixed(2)+'x'; }
  sc.addEventListener('input', apply); apply();
})();
</script>
</body>
</html>
