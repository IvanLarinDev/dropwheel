<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Open animation setting - Preview first</title>
<style>
  :root { font-family: "Segoe UI", Arial, sans-serif; color: #18202a; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #e9edf3; }
  .window { width: 390px; background: #fff; border: 1px solid #c8d0da; box-shadow: 0 18px 54px #52617333; }
  .title { padding: 14px 18px; font-weight: 600; border-bottom: 1px solid #dce2ea; }
  .body { padding: 18px; }
  .motion { display: grid; grid-template-columns: 116px 1fr; gap: 14px; padding: 12px; border: 1px solid #cfd7e2; background: #f7f9fc; margin-bottom: 14px; }
  .wheel { width: 112px; height: 112px; border-radius: 50%; border: 14px solid #dce7f7; position: relative; box-sizing: border-box; }
  .hub { position: absolute; width: 30px; height: 30px; border-radius: 50%; background: #256fcf; left: 27px; top: 27px; box-shadow: 0 4px 12px #256fcf55; }
  .tile { position: absolute; width: 18px; height: 18px; border-radius: 5px; background: #ffffff; border: 1px solid #95a9c2; box-shadow: 0 3px 8px #51607133; }
  .t1 { left: 33px; top: -2px; } .t2 { right: -1px; top: 33px; } .t3 { left: 33px; bottom: -2px; } .t4 { left: -1px; top: 33px; }
  label { display: block; font-size: 12px; color: #536171; margin-bottom: 5px; }
  select, input { width: 100%; box-sizing: border-box; height: 32px; border: 1px solid #b9c4d1; background: white; padding: 0 9px; font: inherit; }
  .summary { font-size: 13px; line-height: 1.35; color: #3d4957; margin-top: 8px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { margin-bottom: 12px; }
  button { background: #256fcf; border: 0; color: white; height: 34px; min-width: 96px; font: inherit; }
  .actions { display: flex; justify-content: flex-end; margin-top: 2px; }
</style>
</head>
<body>
  <section class="window">
    <div class="title">Settings - Dropwheel</div>
    <div class="body">
      <div class="motion">
        <div class="wheel"><span class="hub"></span><span class="tile t1"></span><span class="tile t2"></span><span class="tile t3"></span><span class="tile t4"></span></div>
        <div>
          <label>Open animation</label>
          <select><option>Radial burst</option><option>Pop</option><option>Clock sweep</option><option>Magnetic settle</option></select>
          <div class="summary">Targets travel outward from the orb, then settle on the rim.</div>
        </div>
      </div>
      <div class="grid">
        <div class="field"><label>Theme</label><select><option>Fluent</option></select></div>
        <div class="field"><label>Default action</label><select><option>Copy</option></select></div>
      </div>
      <div class="grid">
        <div class="field"><label>Hover delay, ms</label><input value="250"></div>
        <div class="field"><label>Idle fade, sec</label><input value="0"></div>
      </div>
      <div class="field"><label>Global hotkey</label><input value="Ctrl+Alt+Space"></div>
      <div class="actions"><button>Save</button></div>
    </div>
  </section>
</body>
</html>
