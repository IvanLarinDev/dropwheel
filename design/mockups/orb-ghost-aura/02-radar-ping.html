<!doctype html>
<meta charset="utf-8">
<title>orb-ghost-aura - Radar ping</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1420; color:#e6ebf5; font:14px system-ui,'Segoe UI',sans-serif; }
  main { width:min(760px,calc(100vw - 32px)); }
  header { display:flex; align-items:end; gap:12px; margin-bottom:12px; }
  h1 { margin:0; font-size:22px; } .sub { color:#93a1b8; font-size:12px; margin-top:4px; max-width:560px; }
  .meta { margin-left:auto; color:#6d7c95; font-size:12px; white-space:nowrap; }
  .stage { position:relative; height:340px; background:#151b29; border:1px solid #26314a; border-radius:8px; overflow:hidden; }
  footer { display:flex; align-items:center; gap:14px; margin-top:12px; color:#93a1b8; }
  button { min-height:36px; padding:8px 14px; border:1px solid #2f66d6; border-radius:6px; background:#2563eb; color:#fff; cursor:pointer; }
  .phase { color:#7cc4ff; font-weight:600; }
</style>
<main>
  <header>
    <div><h1>2 · Radar ping</h1><div class="sub">Rings expand outward from the ghost in a steady beat, like a sensor locking on to the object beneath it.</div></div>
    <span class="meta">steady beat</span>
  </header>
  <div class="stage"><svg id="stage" viewBox="0 0 520 340" width="100%" height="100%"></svg></div>
  <footer><button id="replay" type="button">Replay</button><span class="phase" id="phase">The ghost holds over the target — its aura is alive</span></footer>
</main>
<script>
const NS='http://www.w3.org/2000/svg';
const ACCENT='#7cc4ff';
const GX0=95,GY=180,GX1=350;
const svg=document.getElementById('stage');
let ghost,halo,core,aura,t0,raf;
function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
function ease(t){return 1-Math.pow(1-t,3);}
function build(){
  svg.replaceChildren();
  const defs=el('defs',{});
  const f=el('filter',{id:'glow',x:'-120%',y:'-120%',width:'340%',height:'340%'});
  f.appendChild(el('feGaussianBlur',{stdDeviation:6}));
  defs.appendChild(f); svg.appendChild(defs);
  const file=el('g',{});
  file.appendChild(el('rect',{x:GX1-17,y:GY-22,width:34,height:44,rx:4,fill:'#243247',stroke:'#3f5170'}));
  file.appendChild(el('rect',{x:GX1-9,y:GY-11,width:18,height:3,rx:1.5,fill:ACCENT}));
  file.appendChild(el('rect',{x:GX1-9,y:GY-3,width:18,height:3,rx:1.5,fill:'#4a5a74'}));
  svg.appendChild(file);
  svg.appendChild(el('rect',{x:GX1-26,y:GY-31,width:52,height:62,rx:8,fill:'none',stroke:ACCENT,'stroke-width':2.5,opacity:0.9}));
  ghost=el('g',{opacity:0.95});
  halo=el('circle',{cx:0,cy:0,r:20,fill:ACCENT,filter:'url(#glow)',opacity:0});
  ghost.appendChild(halo);
  aura=el('g',{}); ghost.appendChild(aura);
  ghost.appendChild(el('circle',{cx:0,cy:0,r:21,fill:'#22304a',stroke:'#3f5170','stroke-width':1.2}));
  core=el('circle',{cx:0,cy:0,r:8,fill:'#3f5170'}); ghost.appendChild(core);
  svg.appendChild(ghost);
  buildAura();
}
function frame(now){
  const e=(now-t0)/1000;
  const ap=Math.min(1,e/0.7);
  const gx=GX0+(GX1-GX0)*ease(ap), arm=ap;
  ghost.setAttribute('transform',`translate(${gx},${GY})`);
  core.setAttribute('r',8+arm*6);
  core.setAttribute('fill',arm>0.5?ACCENT:'#3f5170');
  drawAura(e,arm);
  raf=requestAnimationFrame(frame);
}
function play(){ cancelAnimationFrame(raf); build(); t0=performance.now(); raf=requestAnimationFrame(frame); }

let rings=[];
function buildAura(){
  rings=[];
  for(let i=0;i<3;i++){ const c=el('circle',{cx:0,cy:0,r:20,fill:'none',stroke:ACCENT,'stroke-width':2,opacity:0}); aura.appendChild(c); rings.push(c); }
}
function drawAura(e,arm){
  halo.setAttribute('opacity',arm*0.5); halo.setAttribute('r',18);
  for(let i=0;i<3;i++){
    const ph=((e/0.95)+i/3)%1;
    rings[i].setAttribute('r',18+ph*48);
    rings[i].setAttribute('opacity',(1-ph)*0.75*arm);
    rings[i].setAttribute('stroke-width',2.6-ph*1.6);
  }
}

document.getElementById('replay').addEventListener('click',play);
play();
</script>
