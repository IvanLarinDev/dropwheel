<!doctype html>
<meta charset="utf-8">
<title>orb-proximity-language - Leash</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1420; color:#e6ebf5; font:14px system-ui,'Segoe UI',sans-serif; }
  main { width:min(860px,calc(100vw - 32px)); }
  header { display:flex; align-items:end; gap:12px; margin-bottom:12px; }
  h1 { margin:0; font-size:22px; } .sub { color:#93a1b8; font-size:12px; margin-top:4px; max-width:640px; }
  .meta { margin-left:auto; color:#6d7c95; font-size:12px; white-space:nowrap; }
  .stage { position:relative; height:420px; background:#151b29; border:1px solid #26314a; border-radius:8px; overflow:hidden; }
  footer { display:flex; align-items:center; gap:14px; margin-top:12px; color:#93a1b8; }
  button { min-height:36px; padding:8px 14px; border:1px solid #2f66d6; border-radius:6px; background:#2563eb; color:#fff; cursor:pointer; }
  .phase { color:#7cc4ff; font-weight:600; }
</style>
<main>
  <header>
    <div><h1>3 · Leash</h1><div class="sub">A visible magnetic thread links object to orb on the way in, and ghost to target on the way out. The thread carries the charge, making the connection literal on both halves.</div></div>
    <span class="meta">magnetic thread</span>
  </header>
  <div class="stage"><svg id="stage" viewBox="0 0 720 400" width="100%" height="100%"></svg></div>
  <footer><button id="replay" type="button">Replay</button><span class="phase" id="phase">…</span></footer>
</main>
<script>
const P = {
  inhaleMs: 1050, chargeCurve: 'outCubic', breath: 0.14, look: 6,
  latchMs: 280, latchScale: 2.1, latchEase: 'outCubic', pauseMs: 80,
  emitMs: 780, emitEase: 'inOutSine', targetLatchMs: 260,
  returnMs: 520, returnEase: 'outCubic', furlScale: 2.0,
  leash: true, trail: false, accent: '#7cc4ff',
};

const NS='http://www.w3.org/2000/svg';
const OX=360,OY=200,orbR=30,coreR=12;
const OBJ0={x:74,y:200},OBJ1={x:254,y:200};
const TGT={x:642,y:200},GH1={x:566,y:200};
const ACCENT=P.accent;
const svg=document.getElementById('stage');
const phase=document.getElementById('phase');
const E={linear:t=>t,inExpo:t=>t===0?0:Math.pow(2,10*t-10),outCubic:t=>1-Math.pow(1-t,3),inOutSine:t=>-(Math.cos(Math.PI*t)-1)/2,outBack:t=>{const c=1.70158,c3=c+1;return 1+c3*Math.pow(t-1,3)+c*Math.pow(t-1,2);}};
const CE={linear:'linear',outCubic:'cubic-bezier(.22,.61,.36,1)',inExpo:'cubic-bezier(.7,0,.84,0)',inOutSine:'cubic-bezier(.37,0,.63,1)',outBack:'cubic-bezier(.34,1.56,.64,1)'};
function el(n,a){const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function lerp(a,b,t){return a+(b-a)*t;}
function raf(ms,ease,on){return new Promise(res=>{const s=performance.now();requestAnimationFrame(function step(now){let t=Math.min(1,(now-s)/ms);on(ease?ease(t):t,t,now-s);if(t<1)requestAnimationFrame(step);else res();});});}
function tr(x,y,s){return {transform:`translate(${x}px,${y}px) scale(${s})`};}
function build(){
  svg.replaceChildren();
  const tgt=el('g',{});
  tgt.appendChild(el('rect',{x:TGT.x-16,y:TGT.y-20,width:32,height:40,rx:4,fill:'#243247',stroke:'#3f5170'}));
  tgt.appendChild(el('rect',{x:TGT.x-8,y:TGT.y-9,width:16,height:3,rx:1.5,fill:ACCENT}));
  tgt.appendChild(el('rect',{x:TGT.x-8,y:TGT.y-2,width:16,height:3,rx:1.5,fill:'#4a5a74'}));
  svg.appendChild(tgt);
  const tgtHi=el('rect',{x:TGT.x-24,y:TGT.y-28,width:48,height:56,rx:9,fill:'none',stroke:ACCENT,'stroke-width':2.5,opacity:0});
  svg.appendChild(tgtHi);
  const leash=el('path',{d:'',fill:'none',stroke:ACCENT,'stroke-width':2,'stroke-linecap':'round',opacity:0});
  svg.appendChild(leash);
  const wheelLayer=el('g',{}); svg.appendChild(wheelLayer);
  const trailLayer=el('g',{}); svg.appendChild(trailLayer);
  const ringLayer=el('g',{}); svg.appendChild(ringLayer);
  const orbHalo=el('circle',{cx:OX,cy:OY,r:orbR,fill:ACCENT,opacity:0}); svg.appendChild(orbHalo);
  const orbBody=el('circle',{cx:OX,cy:OY,r:orbR,fill:'#22304a',stroke:'#3f5170','stroke-width':1.5}); svg.appendChild(orbBody);
  const orbCore=el('circle',{cx:OX,cy:OY,r:coreR,fill:ACCENT}); svg.appendChild(orbCore);
  const obj=el('g',{});
  obj.appendChild(el('rect',{x:-16,y:-20,width:32,height:40,rx:4,fill:'#243247',stroke:'#3f5170'}));
  obj.appendChild(el('rect',{x:-8,y:-9,width:16,height:3,rx:1.5,fill:ACCENT}));
  obj.appendChild(el('rect',{x:-8,y:-2,width:16,height:3,rx:1.5,fill:'#4a5a74'}));
  obj.setAttribute('transform',`translate(${OBJ0.x},${OBJ0.y})`);
  svg.appendChild(obj);
  return {tgtHi,leash,wheelLayer,trailLayer,ringLayer,orbHalo,orbBody,orbCore,obj};
}
function updateOrb(S,ch,tx,ty,elapsed){
  S.orbHalo.setAttribute('r',orbR+6+ch*22);
  S.orbHalo.setAttribute('opacity',0.06+ch*0.5);
  const br=coreR*(1+(0.05+P.breath*ch)*Math.sin(elapsed/110));
  S.orbCore.setAttribute('r',Math.max(4,br));
  const dx=tx-OX,dy=ty-OY,len=Math.hypot(dx,dy)||1;
  S.orbCore.setAttribute('cx',OX+dx/len*ch*P.look);
  S.orbCore.setAttribute('cy',OY+dy/len*ch*P.look);
}
function drawLeash(S,ax,ay,bx,by,ch){
  const mx=(ax+bx)/2,my=(ay+by)/2;
  S.leash.setAttribute('d',`M${ax},${ay} Q${mx},${my-34} ${bx},${by}`);
  S.leash.setAttribute('opacity',0.12+ch*0.6);
  S.leash.setAttribute('stroke-width',1+ch*2.5);
}
function spawnGhost(){
  const g=el('g',{opacity:0.95});
  const halo=el('circle',{cx:0,cy:0,r:16,fill:ACCENT,opacity:0});
  const body=el('circle',{cx:0,cy:0,r:16,fill:'#22304a',stroke:'#3f5170','stroke-width':1.2});
  const core=el('circle',{cx:0,cy:0,r:7,fill:'#3f5170'});
  g.append(halo,body,core);
  g.setAttribute('transform',`translate(${OX},${OY})`);
  svg.appendChild(g);
  return {g,halo,body,core};
}
function moveGhost(gh,x,y,s){gh.g.setAttribute('transform',`translate(${x},${y}) scale(${s??1})`);}
function armGhost(gh,ch,gx,gy){
  gh.core.setAttribute('r',7+ch*4);
  gh.core.setAttribute('fill',ch>0.45?ACCENT:'#3f5170');
  gh.halo.setAttribute('r',16+ch*10);
  gh.halo.setAttribute('opacity',ch*0.4);
  const dx=TGT.x-gx,dy=TGT.y-gy,len=Math.hypot(dx,dy)||1;
  gh.core.setAttribute('cx',dx/len*ch*3);
  gh.core.setAttribute('cy',dy/len*ch*3);
}
let lastTrail=0;
function trail(S,x,y,now){
  if(now-lastTrail<44)return; lastTrail=now;
  const d=el('circle',{cx:x,cy:y,r:6,fill:ACCENT,opacity:0.45});
  S.trailLayer.appendChild(d);
  d.animate([{opacity:0.45},{opacity:0}],{duration:380,fill:'forwards'});
  setTimeout(()=>d.remove(),400);
}
function flashRing(S,cx,cy,baseR,scaleTo,ms,cssE){
  const g=el('g',{transform:`translate(${cx},${cy})`});
  const c=el('circle',{cx:0,cy:0,r:baseR,fill:'none',stroke:ACCENT,'stroke-width':4});
  g.append(c); S.ringLayer.appendChild(g);
  c.animate([{transform:'scale(1)',opacity:0.9},{transform:`scale(${scaleTo})`,opacity:0}],{duration:ms,easing:cssE,fill:'forwards'});
  setTimeout(()=>g.remove(),ms+60);
}
function openWheel(S,ms){
  const N=5,R=112;
  for(let i=0;i<N;i++){
    const a=(-158+i*(136/(N-1)))*Math.PI/180;
    const sx=OX+R*Math.cos(a),sy=OY+R*Math.sin(a);
    const g=el('g',{});
    g.appendChild(el('rect',{x:-26,y:-26,width:52,height:52,rx:14,fill:'#1b2436',stroke:'#33415c','stroke-width':1.2}));
    g.appendChild(el('circle',{cx:0,cy:0,r:9,fill:'#33415c'}));
    S.wheelLayer.appendChild(g);
    g.setAttribute('transform',`translate(${sx},${sy})`);
    g.animate([tr(OX,OY,0.3),tr(sx,sy,1)],{duration:ms,delay:i*22,easing:CE.outBack,fill:'forwards'});
    g.animate([{opacity:0},{opacity:1}],{duration:ms*0.7,delay:i*22,fill:'forwards'});
  }
}
async function play(){
  const S=build();
  phase.textContent='① Object nears the orb — charge flows in along the thread';
  await raf(P.inhaleMs,null,(e,t,ela)=>{
    const ox=lerp(OBJ0.x,OBJ1.x,t),oy=OBJ0.y;
    S.obj.setAttribute('transform',`translate(${ox},${oy})`);
    const ch=E[P.chargeCurve](t);
    updateOrb(S,ch,ox,oy,ela);
    if(P.leash)drawLeash(S,ox,oy,OX,OY,ch);
  });
  phase.textContent='② Threshold — latch: ring flash, the wheel opens';
  flashRing(S,OX,OY,orbR,P.latchScale,P.latchMs,CE[P.latchEase]);
  openWheel(S,P.latchMs+120);
  if(P.leash)S.leash.animate([{opacity:S.leash.getAttribute('opacity')},{opacity:0}],{duration:200,fill:'forwards'});
  await wait(P.latchMs+P.pauseMs);
  phase.textContent='③ The orb sends a ghost out — the thread reaches for the target';
  const gh=spawnGhost();
  await raf(P.emitMs,E[P.emitEase],(e,t,ela)=>{
    const gx=lerp(OX,GH1.x,e),gy=lerp(OY,GH1.y,e);
    moveGhost(gh,gx,gy,1);
    const ch=E[P.chargeCurve](t);
    armGhost(gh,ch,gx,gy);
    if(P.leash)drawLeash(S,gx,gy,TGT.x,TGT.y,ch);
    if(P.trail)trail(S,gx,gy,performance.now());
    updateOrb(S,0.22*(1-t),OBJ1.x,OBJ1.y,ela);
  });
  phase.textContent='④ Ghost at the target — latch highlights the object';
  if(P.leash)S.leash.animate([{opacity:S.leash.getAttribute('opacity')},{opacity:0}],{duration:220,fill:'forwards'});
  S.tgtHi.animate([{opacity:0},{opacity:1}],{duration:P.targetLatchMs*0.5,fill:'forwards'});
  flashRing(S,TGT.x,TGT.y,26,1.7,P.targetLatchMs,CE[P.latchEase]);
  await wait(P.targetLatchMs+120);
  phase.textContent='⑤ Ghost returns — the charge furls into the ring';
  await raf(P.returnMs,E[P.returnEase],(e,t,ela)=>{
    const gx=lerp(GH1.x,OX,e),gy=lerp(GH1.y,OY,e);
    moveGhost(gh,gx,gy,1-0.5*e);
    gh.g.setAttribute('opacity',0.95*(1-e*0.9));
    if(P.trail)trail(S,gx,gy,performance.now());
    S.tgtHi.setAttribute('opacity',0.9*(1-e));
  });
  gh.g.remove();
  flashRing(S,OX,OY,orbR,P.furlScale,P.latchMs+40,CE.outCubic);
  S.orbHalo.setAttribute('opacity',0.55);
  S.orbHalo.animate([{opacity:0.55},{opacity:0.06}],{duration:460,fill:'forwards'});
  S.orbCore.setAttribute('cx',OX);S.orbCore.setAttribute('cy',OY);S.orbCore.setAttribute('r',coreR);
  await wait(560);
  phase.textContent='One phrase: charge in → latch → out → furl. Both ways, one law.';
}
document.getElementById('replay').addEventListener('click',()=>{lastTrail=0;play();});
play();
</script>
