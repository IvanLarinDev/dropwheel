<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Magnetic settle — варианты анимации входа тайлов</title>
<style>
  body { background:#12161c; color:#c9d2de; font-family:Segoe UI, sans-serif; margin:0; padding:24px; }
  h1 { font-size:18px; font-weight:500; margin:0 0 4px; }
  .sub { color:#8a96a8; font-size:13px; margin:0 0 18px; }
  button { background:#222933; color:#c9d2de; border:1px solid #55606e; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:12px; }
  #grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
</style>
</head>
<body>
<h1>Magnetic settle — варианты анимации входа тайлов</h1>
<p class="sub">Слева текущий Pop как эталон, затем четыре варианта Magnetic settle. Выбран вариант A (см. CHOICE.md).</p>
<div style="margin-bottom:14px;"><button id="playAll">Проиграть все</button></div>
<div id="grid"></div>
<script>
(function(){
  const CX=90, CY=90, R=60, N=6, TILE=24, DUR=950;
  const variants = [
    {key:'pop', title:'Pop (сейчас)', rec:false},
    {key:'A', title:'A · дуга + защёлка', rec:true},
    {key:'B', title:'B · дуга + мягко', rec:false},
    {key:'C', title:'C · синхронная волна', rec:false},
    {key:'D', title:'D · притяжение извне', rec:false},
  ];
  const easeOutCubic = p => 1 - Math.pow(1-p, 3);
  const easeOutBack = (p,s)=>{ const c1=s, c3=c1+1; return 1 + c3*Math.pow(p-1,3) + c1*Math.pow(p-1,2); };
  const easeOutElastic = p => { if(p===0||p===1) return p; const c4=(2*Math.PI)/3; return Math.pow(2,-9*p)*Math.sin((p*10-0.75)*c4)+1; };
  const clamp = p => Math.max(0, Math.min(1, p));
  function target(i){ const a=(-90 + i*(360/N))*Math.PI/180; return {x:CX+R*Math.cos(a), y:CY+R*Math.sin(a), a}; }
  function frame(key, tg, e){
    let sx, sy, arc=0, eased; const dirx=Math.cos(tg.a), diry=Math.sin(tg.a);
    if(key==='pop'){ sx=CX+dirx*R*0.12; sy=CY+diry*R*0.12; eased=easeOutBack(e,1.9); }
    else if(key==='A'){ sx=CX+dirx*R*0.05; sy=CY+diry*R*0.05; eased=easeOutElastic(e); arc=32; }
    else if(key==='B'){ sx=CX+dirx*R*0.05; sy=CY+diry*R*0.05; eased=easeOutCubic(e); arc=32; }
    else if(key==='C'){ sx=tg.x+40; sy=tg.y+30; eased=easeOutBack(e,1.1); }
    else { sx=CX+dirx*R*1.4; sy=CY+diry*R*1.4; eased=easeOutBack(e,2.2); }
    let x=sx+(tg.x-sx)*eased, y=sy+(tg.y-sy)*eased;
    if(arc){ const off=arc*Math.sin(Math.PI*clamp(eased)); x+=(-diry)*off; y+=(dirx)*off; }
    return {x,y,s:0.6+0.4*clamp(eased)};
  }
  function makeWheel(v){
    const card=document.createElement('div');
    card.style.cssText='background:#1a1f27;border-radius:12px;padding:10px;'+(v.rec?'outline:2px solid #6fa8ff;outline-offset:2px;':'');
    const head=document.createElement('div'); head.style.cssText='font-size:12px;font-weight:500;margin-bottom:6px;'; head.textContent=v.title+(v.rec?'  · выбор':'');
    card.appendChild(head);
    const stage=document.createElement('div'); stage.style.cssText='position:relative;width:180px;height:180px;margin:0 auto;';
    const orb=document.createElement('div'); orb.style.cssText='position:absolute;width:20px;height:20px;border-radius:50%;background:#8a96a8;left:'+(CX-10)+'px;top:'+(CY-10)+'px;'; stage.appendChild(orb);
    const tiles=[]; for(let i=0;i<N;i++){ const dv=document.createElement('div');
      dv.style.cssText='position:absolute;width:'+TILE+'px;height:'+TILE+'px;border-radius:6px;background:rgba(111,168,255,.18);border:1.5px solid #6fa8ff;will-change:transform,opacity;'; stage.appendChild(dv); tiles.push(dv); }
    card.appendChild(stage);
    const btn=document.createElement('button'); btn.textContent='Проиграть'; btn.style.cssText='width:100%;margin-top:8px;'; card.appendChild(btn);
    const tgs=tiles.map((_,i)=>target(i));
    function play(){ const t0=performance.now();
      function tick(now){ const gt=now-t0; let done=true;
        for(let i=0;i<N;i++){ const delay=v.key==='C'?0:i*70; const raw=clamp((gt-delay)/DUR); if(raw<1) done=false;
          const f=frame(v.key,tgs[i],raw);
          tiles[i].style.opacity=clamp(((gt-delay)/DUR)*3).toFixed(2);
          tiles[i].style.transform='translate('+(f.x-TILE/2).toFixed(1)+'px,'+(f.y-TILE/2).toFixed(1)+'px) scale('+f.s.toFixed(3)+')'; }
        if(!done) requestAnimationFrame(tick); }
      requestAnimationFrame(tick); }
    btn.addEventListener('click',play); return {card,play};
  }
  const grid=document.getElementById('grid');
  const wheels=variants.map(v=>{ const w=makeWheel(v); grid.appendChild(w.card); return w; });
  document.getElementById('playAll').addEventListener('click',()=>wheels.forEach(w=>w.play()));
  setTimeout(()=>wheels.forEach(w=>w.play()), 250);
})();
</script>
</body>
</html>
