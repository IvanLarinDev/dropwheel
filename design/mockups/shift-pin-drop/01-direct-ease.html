<!doctype html>
<meta charset="utf-8">
<title>shift-pin-drop - Direct ease</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1420; color:#e6ebf5; font:14px system-ui,'Segoe UI',sans-serif; }
  main { width:min(760px,calc(100vw - 32px)); }
  header { display:flex; align-items:end; gap:12px; margin-bottom:12px; }
  h1 { margin:0; font-size:22px; } .sub { color:#93a1b8; font-size:12px; margin-top:4px; }
  .meta { margin-left:auto; color:#6d7c95; font-size:12px; }
  .stage { position:relative; height:470px; background:#151b29; border:1px solid #26314a; border-radius:8px; overflow:hidden; }
  footer { display:flex; align-items:center; gap:14px; margin-top:12px; color:#93a1b8; }
  button { min-height:36px; padding:8px 14px; border:1px solid #2f66d6; border-radius:6px; background:#2563eb; color:#fff; cursor:pointer; }
  .phase { color:#7cc4ff; font-weight:600; }
</style>
<main>
  <header>
    <div><h1>1 · Direct ease</h1><div class="sub">Shift+drop on the orb pins a target. Fast, restrained, no overshoot.</div></div>
    <span class="meta">160&thinsp;ms land · 120&thinsp;ms ring</span>
  </header>
  <div class="stage"><svg id="wheel" viewBox="0 0 460 460" width="100%" height="100%"></svg></div>
  <footer><button id="replay" type="button">Replay</button><span class="phase" id="phase">…</span></footer>
</main>
<script>
const NS = 'http://www.w3.org/2000/svg';
const CX = 230, CY = 230, RING = 170, TILE = 64;
const EXISTING = ['Downloads', 'Docs', 'Desktop', 'Pictures'];
const EASE = 'cubic-bezier(.2,.8,.2,1)';
const LAND_MS = 160, RING_MS = 120;

const svg = document.getElementById('wheel');
const phase = document.getElementById('phase');

function el(name, attrs) {
  const node = document.createElementNS(NS, name);
  for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  return node;
}
function slot(index, count) {
  const angle = (-90 + index * (360 / count)) * Math.PI / 180;
  return { x: CX + RING * Math.cos(angle), y: CY + RING * Math.sin(angle) };
}
function tile(label, pinned) {
  const g = el('g', { opacity: 1 });
  g.appendChild(el('rect', {
    x: -TILE / 2, y: -TILE / 2, width: TILE, height: TILE, rx: 16,
    fill: pinned ? '#1d3a5f' : '#1b2436', stroke: pinned ? '#7cc4ff' : '#33415c', 'stroke-width': pinned ? 2 : 1.2,
  }));
  const text = el('text', { y: 4, 'text-anchor': 'middle', fill: pinned ? '#cfe6ff' : '#9fb0c9', 'font-size': 11 });
  text.textContent = label;
  g.appendChild(text);
  return g;
}
function place(node, point) { node.setAttribute('transform', `translate(${point.x},${point.y})`); }

function build() {
  svg.replaceChildren();
  svg.appendChild(el('circle', { cx: CX, cy: CY, r: RING, fill: 'none', stroke: '#222c42', 'stroke-width': 30 }));
  const layer = el('g', {});
  svg.appendChild(layer);
  const orb = el('g', {});
  orb.appendChild(el('circle', { cx: CX, cy: CY, r: 28, fill: '#22304a', stroke: '#3f5170', 'stroke-width': 1 }));
  orb.appendChild(el('circle', { cx: CX, cy: CY, r: 11, fill: '#7cc4ff' }));
  svg.appendChild(orb);
  return layer;
}

async function play() {
  const layer = build();
  const total = EXISTING.length + 1;
  const old = EXISTING.map((label, i) => {
    const node = tile(label, false);
    place(node, slot(i, EXISTING.length));
    layer.appendChild(node);
    return node;
  });

  phase.textContent = 'Shift held over the orb — ring confirms "pin"';
  const ring = el('circle', { cx: CX, cy: CY, r: 28, fill: 'none', stroke: '#7cc4ff', 'stroke-width': 2 });
  svg.appendChild(ring);
  ring.animate([{ r: 28, opacity: 0 }, { r: 40, opacity: 1 }], { duration: RING_MS, easing: EASE, fill: 'forwards' });
  await wait(520);

  phase.textContent = 'Drop — the new tile takes the first slot, the rest step over';
  old.forEach((node, i) => {
    const from = slot(i, EXISTING.length), to = slot(i + 1, total);
    node.animate([transform(from), transform(to)], { duration: LAND_MS, easing: EASE, fill: 'forwards' });
  });

  const fresh = tile('Sorted', true);
  const target = slot(0, total);
  place(fresh, target);
  layer.appendChild(fresh);
  fresh.animate([{ opacity: 0 }, { opacity: 1 }], { duration: LAND_MS, easing: EASE });
  fresh.animate(
    [transform({ x: CX, y: CY }), transform(target)],
    { duration: LAND_MS, easing: EASE, fill: 'forwards' });
  ring.animate([{ opacity: 1 }, { opacity: 0 }], { duration: RING_MS, fill: 'forwards' });
  await wait(LAND_MS + 260);
  phase.textContent = 'Pinned. Tile sits first, badge border stays.';
}
function transform(p) { return { transform: `translate(${p.x}px,${p.y}px)` }; }
function wait(ms) { return new Promise((r) => setTimeout(r, ms)); }

document.getElementById('replay').addEventListener('click', play);
play();
</script>
