<!doctype html>
<meta charset="utf-8">
<title>Per-target launch options - Collapsible master detail</title>
<style>
  :root{--bg:#11161d;--panel:#202733;--panel2:#283241;--line:#3b4656;--text:#eef2f7;--muted:#a8b3c2;--accent:#7cc7ff;--ok:#9fe870}
  *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#0d1117;color:var(--text);display:grid;place-items:center;font:13px "Segoe UI",system-ui,sans-serif}
  .win{width:700px;background:var(--panel);border:1px solid var(--line);box-shadow:0 24px 70px rgba(0,0,0,.45)}
  header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center}h1{font-size:15px;margin:0}.badge{margin-left:auto;color:var(--ok);font-size:12px}
  main{padding:16px}.top{display:grid;grid-template-columns:1fr 110px;gap:12px;margin-bottom:12px}label{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}
  input,select{width:100%;height:32px;background:#111821;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:0 9px;font:12px Consolas,monospace}
  details{border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:0;margin-top:14px}summary{cursor:pointer;padding:12px 14px;font-weight:600}.inside{padding:0 14px 14px}
  .mode{display:flex;gap:8px;margin-bottom:12px}.seg{border:1px solid var(--line);padding:6px 11px;border-radius:6px}.seg.active{background:var(--accent);color:#06131d;border-color:var(--accent)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.preview{margin-top:12px;background:#10161e;border:1px solid var(--line);border-radius:6px;padding:10px;font-family:Consolas,monospace;color:#d7e5f4;line-height:1.5}
  .hint{margin-top:8px;color:var(--muted);font-size:12px}.hint code{color:var(--accent)}
  footer{border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-end;gap:8px}button{height:31px;border:1px solid var(--line);background:#222c39;color:var(--text);border-radius:6px;padding:0 12px}.primary{background:var(--accent);border-color:var(--accent);color:#06131d}
</style>
<section class="win">
  <header><h1>Edit target</h1><span class="badge">Run target</span></header>
  <main>
    <div class="top"><div><label>Name</label><input value="Archive to project"></div><div><label>Pinned</label><select><option>Yes</option></select></div></div>
    <label>Path</label><input value="C:\Tools\archive.bat">
    <details open>
      <summary>Launch options for this target</summary>
      <div class="inside">
        <div class="mode"><span class="seg">Default</span><span class="seg active">Custom</span></div>
        <div class="grid"><div><label>Program</label><input value="{target}"></div><div><label>Working directory</label><input value="{targetDir}"></div></div>
        <div style="margin-top:12px"><label>Arguments</label><input value='/zip /keep-structure /dest "D:\Archive" {files}'></div>
        <div class="preview">C:\Tools\archive.bat /zip /keep-structure /dest "D:\Archive" "C:\Drop\shot.mov"</div>
        <div class="hint">Tokens: <code>{target}</code> <code>{targetDir}</code> <code>{files}</code></div>
      </div>
    </details>
  </main>
  <footer><button>Test</button><button>Cancel</button><button class="primary">Save</button></footer>
</section>
