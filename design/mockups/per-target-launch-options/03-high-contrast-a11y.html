<!doctype html>
<meta charset="utf-8">
<title>Per-target launch options - A11y explicit</title>
<style>
  *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#000;color:#000;display:grid;place-items:center;font:15px "Segoe UI",system-ui,sans-serif}.win{width:680px;background:#fff;border:3px solid #000}
  header{padding:14px 16px;border-bottom:3px solid #000}h1{font-size:19px;margin:0}main{padding:16px}label{display:block;font-weight:700;margin:0 0 6px}
  input,select{width:100%;height:38px;border:3px solid #000;padding:0 8px;font:14px Consolas,monospace;margin-bottom:14px;background:#fff;color:#000}
  .box{border:3px solid #000;padding:14px;background:#fff8bf}.choice{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.choice button{height:42px}.choice .on{background:#0047ff;color:#fff}
  .preview{border:3px solid #000;padding:10px;background:#eaffea;font-family:Consolas,monospace;line-height:1.5}.error{border:3px solid #000;background:#ffe5e5;padding:10px;margin-top:10px}
  footer{border-top:3px solid #000;padding:14px 16px;display:flex;gap:10px;justify-content:flex-end}button{border:3px solid #000;background:#fff;color:#000;font-weight:700;padding:0 14px;height:38px}.primary{background:#0047ff;color:#fff}
</style>
<section class="win">
  <header><h1>How should this target run?</h1></header>
  <main>
    <label>Target file</label><input value="C:\Tools\upload.bat">
    <section class="box">
      <div class="choice"><button>Use normal launch</button><button class="on">Use custom launch</button></div>
      <label>Program</label><input value="{target}">
      <label>Arguments</label><input value="--profile prod --retry 3 {files}">
      <label>Working directory</label><input value="{targetDir}">
      <div class="preview">C:\Tools\upload.bat --profile prod --retry 3 "C:\Drop\report.pdf"</div>
      <div class="error">This setting is saved on Upload target only. Other .bat targets are unchanged.</div>
    </section>
  </main>
  <footer><button>Cancel</button><button class="primary">Save target</button></footer>
</section>
