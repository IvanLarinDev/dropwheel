<!doctype html>
<meta charset="utf-8">
<title>dedup-target-highlight - Scale pulse</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0f1420; color:#e6ebf5; font:14px system-ui,'Segoe UI',sans-serif; }
  main { width:min(720px,calc(100vw - 32px)); }
  header { display:flex; align-items:end; gap:12px; margin-bottom:12px; }
  h1 { margin:0; font-size:22px; } .sub { color:#93a1b8; font-size:12px; margin-top:4px; max-width:520px; }
  .meta { margin-left:auto; color:#6d7c95; font-size:12px; text-align:right; }
  .stage { position:relative; height:470px; background:#151b29; border:1px solid #26314a; border-radius:8px; overflow:hidden; }
  .toast { position:absolute; left:50%; bottom:18px; transform:translateX(-50%); padding:8px 14px; border-radius:8px;
           background:#1b2436; border:1px solid #33415c; color:#cfe6ff; font-size:12px; opacity:0; }
  footer { display:flex; align-items:center; gap:14px; margin-top:12px; color:#93a1b8; }
  button { min-height:36px; padding:8px 14px; border:1px solid #2f66d6; border-radius:6px; background:#2563eb; color:#fff; cursor:pointer; }
  .phase { color:#7cc4ff; font-weight:600; }
</style>
<main>
  <header>
    <div><h1>1 · Scale pulse</h1>
      <div class="sub">A duplicate drop makes the tile that is already on the wheel bounce up in size and settle back. Quiet, cheap, reuses the tile's own ScaleTransform.</div></div>
    <span class="meta">360&thinsp;ms · BackEase out<br>scale 1 → 1.18 → 1</span>
  </header>
  <div class="stage">
    <svg id="wheel" viewBox="0 0 460 460" width="100%" height="100%"></svg>
    <div class="toast" id="toast">Already on the wheel: Downloads</div>
  </div>
  <footer><button id="replay" type="button">Replay</button><span class="phase" id="phase">…</span></footer>
</main>
<script>
const NS = 'http://www.w3.org/2000/svg';
const CX = 230, CY = 230, RING = 168, TILE = 66;
const LABELS = ['Downloads', 'Docs', 'Desktop', 'Pictures'];
const DUP_INDEX = 0;
const EASE = 'cubic-bezier(.2,.8,.2,1)';

const svg = document.getElementById('wheel');
const toast = document.getElementById('toast');
const phase = document.getElementById('phase');

function el(name, attrs) {
  const node = document.createElementNS(NS, name);
  for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  return node;
}
function slot(i, count) {
  const a = (-90 + i * (360 / count)) * Math.PI / 180;
  return { x: CX + RING * Math.cos(a), y: CY + RING * Math.sin(a) };
}
function tile(label) {
  const g = el('g', {});
  g.appendChild(el('rect', { x:-TILE/2, y:-TILE/2, width:TILE, height:TILE, rx:16, fill:'#1b2436', stroke:'#33415c', 'stroke-width':1.2 }));
  const t = el('text', { y:4, 'text-anchor':'middle', fill:'#9fb0c9', 'font-size':11 });
  t.textContent = label; g.appendChild(t);
  return g;
}
function place(node, p) { node.setAttribute('transform', `translate(${p.x},${p.y})`); }
function wait(ms) { return new Promise((r) => setTimeout(r, ms)); }

function build() {
  svg.replaceChildren();
  svg.appendChild(el('circle', { cx:CX, cy:CY, r:RING, fill:'none', stroke:'#222c42', 'stroke-width':30 }));
  const layer = el('g', {});
  svg.appendChild(layer);
  const orb = el('g', {});
  orb.appendChild(el('circle', { cx:CX, cy:CY, r:28, fill:'#22304a', stroke:'#3f5170', 'stroke-width':1 }));
  orb.appendChild(el('circle', { cx:CX, cy:CY, r:11, fill:'#7cc4ff' }));
  svg.appendChild(orb);
  return layer;
}

/** The whole point of this variant: the existing tile bounces in scale. */
function highlight(node) {
  node.style.transformBox = 'fill-box';
  node.style.transformOrigin = 'center';
  node.animate(
    [{ transform:'scale(1)' }, { transform:'scale(1.18)', offset:0.4 }, { transform:'scale(0.97)', offset:0.72 }, { transform:'scale(1)' }],
    { duration:360, easing:EASE, fill:'none' });
}

async function play() {
  toast.style.opacity = 0;
  const layer = build();
  const tiles = LABELS.map((label, i) => { const n = tile(label); place(n, slot(i, LABELS.length)); layer.appendChild(n); return n; });

  phase.textContent = 'A folder that is already "Downloads" is dropped on the wheel';
  const drop = el('circle', { cx:70, cy:400, r:13, fill:'#2b3a55', stroke:'#7cc4ff', 'stroke-width':1.5 });
  svg.appendChild(drop);
  const target = slot(DUP_INDEX, LABELS.length);
  drop.animate([{ cx:70, cy:400, opacity:1 }, { cx:target.x, cy:target.y, opacity:0 }], { duration:340, easing:EASE, fill:'forwards' });
  await wait(360);

  phase.textContent = 'No new tile — the existing one is highlighted instead';
  highlight(tiles[DUP_INDEX]);
  toast.animate([{ opacity:0, transform:'translate(-50%, 8px)' }, { opacity:1, transform:'translate(-50%, 0)' }], { duration:180, fill:'forwards' });
  toast.style.opacity = 1;
  await wait(2200);
  toast.animate([{ opacity:1 }, { opacity:0 }], { duration:260, fill:'forwards' });
  toast.style.opacity = 0;
  phase.textContent = 'The wheel still has four tiles.';
}

document.getElementById('replay').addEventListener('click', play);
play();
</script>
