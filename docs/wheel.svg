<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 460" width="460" height="460" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-label="Dropwheel — the radial wheel open on the desktop with target tiles around a central orb">
  <title>Dropwheel</title>
  <desc>The open wheel (Fluent theme): a central orb with spokes and a rim, surrounded by target tiles — folders, a sorter, a group, and the add tile.</desc>
  <defs>
    <radialGradient id="halo" gradientUnits="userSpaceOnUse" cx="230" cy="230" r="46">
      <stop offset="0" stop-color="#4DA3FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#4DA3FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" gradientUnits="userSpaceOnUse" cx="230" cy="230" r="11">
      <stop offset="0" stop-color="#7cc0ff"/>
      <stop offset="1" stop-color="#2b3d54"/>
    </radialGradient>
    <filter id="tsh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="lsh" x="-30%" y="-60%" width="160%" height="220%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.1" flood-color="#000" flood-opacity="0.85"/>
    </filter>
  </defs>

  <!-- desktop stage (Fluent) -->
  <rect x="0" y="0" width="460" height="460" rx="14" fill="#243447"/>

  <!-- rim -->
  <circle cx="230" cy="230" r="170" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="34"/>

  <!-- spokes (to radius 118) -->
  <g stroke="#ffffff" stroke-opacity="0.19" stroke-width="2">
    <line x1="230" y1="230" x2="230" y2="112"/>
    <line x1="230" y1="230" x2="313" y2="147"/>
    <line x1="230" y1="230" x2="348" y2="230"/>
    <line x1="230" y1="230" x2="313" y2="313"/>
    <line x1="230" y1="230" x2="230" y2="348"/>
    <line x1="230" y1="230" x2="147" y2="313"/>
    <line x1="230" y1="230" x2="112" y2="230"/>
    <line x1="230" y1="230" x2="147" y2="147"/>
  </g>

  <!-- ===== tiles (centres on the rim, radius 170, shifted up 8px) ===== -->
  <!-- Desktop -->
  <g transform="translate(230,52)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.2" filter="url(#tsh)"/>
    <rect x="-14" y="-10.5" width="12" height="6" rx="2" fill="#2f6bc0"/>
    <rect x="-14" y="-8" width="28" height="17" rx="2.5" fill="#2f6bc0"/>
    <rect x="-14" y="-4" width="28" height="13" rx="2.5" fill="#4d8ce0"/>
  </g>
  <!-- Documents -->
  <g transform="translate(350,102)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.2" filter="url(#tsh)"/>
    <rect x="-10" y="-13" width="20" height="26" rx="2.5" fill="#f2f5fa"/>
    <polygon points="4,-13 10,-7 4,-7" fill="#cdd6e2"/>
    <g stroke="#9aa6b6" stroke-width="1.4"><line x1="-6" y1="-3" x2="6" y2="-3"/><line x1="-6" y1="1.5" x2="6" y2="1.5"/><line x1="-6" y1="6" x2="6" y2="6"/></g>
  </g>
  <!-- Pictures -->
  <g transform="translate(400,222)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.2" filter="url(#tsh)"/>
    <rect x="-13" y="-11" width="26" height="22" rx="2.5" fill="#eef2f8"/>
    <circle cx="-5" cy="-4" r="3" fill="#f2c94c"/>
    <polygon points="-13,9 -3,-1 4,6 13,-2 13,9" fill="#4f9d69"/>
  </g>
  <!-- sorter (amber border) -->
  <g transform="translate(350,342)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.12" stroke="#ffb84d" stroke-opacity="0.7" stroke-width="1.4" filter="url(#tsh)"/>
    <rect x="-14" y="-10.5" width="12" height="6" rx="2" fill="#c98f2f"/>
    <rect x="-14" y="-8" width="28" height="17" rx="2.5" fill="#c98f2f"/>
    <rect x="-14" y="-4" width="28" height="13" rx="2.5" fill="#e9b24a"/>
  </g>
  <!-- Downloads -->
  <g transform="translate(230,392)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.2" filter="url(#tsh)"/>
    <rect x="-13" y="-13" width="26" height="26" rx="6" fill="#2f8fe6"/>
    <path d="M0,-7 V5 M-5,0 L0,5 L5,0" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Everything (search) -->
  <g transform="translate(110,342)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.24" stroke-width="1.2" filter="url(#tsh)"/>
    <circle cx="-3" cy="-3" r="5" fill="#ffffff" fill-opacity="0.14"/>
    <circle cx="-3" cy="-3" r="7" fill="none" stroke="#ef8a2a" stroke-width="4"/>
    <line x1="2.5" y1="2.5" x2="10" y2="10" stroke="#ef8a2a" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- dropwheel (group: count 4, code badge) -->
  <g transform="translate(60,222)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.12" stroke="#7cc4ff" stroke-opacity="0.7" stroke-width="1.4" filter="url(#tsh)"/>
    <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" fill="#dbe7f5" font-size="22" font-weight="600">4</text>
    <rect x="-34" y="-38" width="24" height="18" rx="9" fill="#4DA3FF"/>
    <text x="-22" y="-28" text-anchor="middle" dominant-baseline="middle" fill="#0d1017" font-family="Consolas, monospace" font-size="11" font-weight="700">11</text>
  </g>
  <!-- Add (dashed) -->
  <g transform="translate(110,102)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.03" stroke="#b4becd" stroke-opacity="0.45" stroke-width="1.6" stroke-dasharray="6 5"/>
    <path d="M0,-11 V11 M-11,0 H11" fill="none" stroke="#c8d2e1" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- ===== orb (hub) ===== -->
  <circle cx="230" cy="230" r="46" fill="url(#halo)"/>
  <circle cx="230" cy="230" r="28" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1"/>
  <circle cx="230" cy="230" r="11" fill="url(#core)"/>
  <g fill="#ffffff" fill-opacity="0.30">
    <circle cx="230" cy="211" r="2"/><circle cx="230" cy="249" r="2"/>
    <circle cx="211" cy="230" r="2"/><circle cx="249" cy="230" r="2"/>
  </g>

  <!-- ===== captions (at rim.y + 40) ===== -->
  <g fill="#dbe7f5" font-size="11.5" text-anchor="middle" filter="url(#lsh)">
    <text x="230" y="103">Desktop</text>
    <text x="350" y="153">Documents</text>
    <text x="400" y="273">Pictures</text>
    <text x="350" y="393">sorter</text>
    <text x="230" y="443">Downloads</text>
    <text x="110" y="393">Everything</text>
    <text x="60" y="273">dropwheel</text>
    <text x="110" y="153">Add</text>
  </g>
</svg>
