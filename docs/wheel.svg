<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 500" width="560" height="500" role="img" aria-label="Dropwheel — the radial wheel open on the desktop, with target tiles around a central orb">
  <title>Dropwheel</title>
  <desc>Illustration of the open wheel: a central orb with spokes, surrounded by target tiles — folders, a sorter, groups, and the add tile.</desc>

  <!-- desktop backdrop -->
  <rect x="0" y="0" width="560" height="500" rx="16" fill="#10151b"/>

  <!-- rim -->
  <circle cx="280" cy="245" r="172" fill="none" stroke="#ffffff" stroke-opacity="0.09" stroke-width="30"/>
  <circle cx="280" cy="245" r="172" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.2"/>

  <!-- spokes -->
  <g stroke="#ffffff" stroke-opacity="0.13" stroke-width="1.4">
    <line x1="280" y1="245" x2="280" y2="73"/>
    <line x1="280" y1="245" x2="402" y2="123"/>
    <line x1="280" y1="245" x2="452" y2="245"/>
    <line x1="280" y1="245" x2="402" y2="367"/>
    <line x1="280" y1="245" x2="280" y2="417"/>
    <line x1="280" y1="245" x2="158" y2="367"/>
    <line x1="280" y1="245" x2="108" y2="245"/>
    <line x1="280" y1="245" x2="158" y2="123"/>
  </g>

  <!-- ==== tiles ==== -->
  <!-- Desktop (top) -->
  <g transform="translate(280,73)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22"/>
    <g transform="translate(-16,-13)" fill="#8fb7e6"><rect x="0" y="4" width="32" height="20" rx="2"/><rect x="0" y="0" width="13" height="6" rx="2"/></g>
    <text x="0" y="50" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="13">Desktop</text>
  </g>
  <!-- Documents -->
  <g transform="translate(402,123)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22"/>
    <g transform="translate(-16,-13)" fill="#8fb7e6"><rect x="0" y="4" width="32" height="20" rx="2"/><rect x="0" y="0" width="13" height="6" rx="2"/></g>
    <text x="0" y="50" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="13">Documents</text>
  </g>
  <!-- Pictures -->
  <g transform="translate(452,245)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22"/>
    <g transform="translate(-16,-13)" fill="#8fb7e6"><rect x="0" y="4" width="32" height="20" rx="2"/><rect x="0" y="0" width="13" height="6" rx="2"/></g>
    <text x="0" y="50" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="13">Pictures</text>
  </g>
  <!-- sorter (amber border) -->
  <g transform="translate(402,367)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.10" stroke="#ffc24d" stroke-opacity="0.75" stroke-width="1.4"/>
    <g transform="translate(-16,-13)" fill="#e6b566"><rect x="0" y="4" width="32" height="20" rx="2"/><rect x="0" y="0" width="13" height="6" rx="2"/></g>
    <text x="0" y="50" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="13">sorter</text>
  </g>
  <!-- Downloads (bottom) -->
  <g transform="translate(280,417)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22"/>
    <g transform="translate(-13,-15)" fill="#8fb7e6"><rect x="6" y="0" width="14" height="16" rx="2"/><path d="M0,14 h26 l-13,12 z"/></g>
    <text x="0" y="50" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="13">Downloads</text>
  </g>
  <!-- web (group, blue border, count badge) -->
  <g transform="translate(158,367)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.10" stroke="#7cc4ff" stroke-opacity="0.75" stroke-width="1.4"/>
    <text x="0" y="8" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">1</text>
    <circle cx="-24" cy="-24" r="10" fill="#2c7be5"/>
    <text x="-24" y="-20" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">1</text>
    <text x="0" y="50" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="13">web</text>
  </g>
  <!-- dropwheel (group, blue border, count + code badge) -->
  <g transform="translate(108,245)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.10" stroke="#7cc4ff" stroke-opacity="0.75" stroke-width="1.4"/>
    <text x="0" y="8" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">4</text>
    <rect x="-31" y="-31" width="20" height="16" rx="8" fill="#2c7be5"/>
    <text x="-21" y="-19" text-anchor="middle" fill="#ffffff" font-family="Consolas, monospace" font-size="11" font-weight="600">2</text>
    <circle cx="24" cy="-24" r="10" fill="#2c7be5"/>
    <text x="24" y="-20" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">4</text>
    <text x="0" y="50" text-anchor="middle" fill="#dbe7f5" font-family="Segoe UI, sans-serif" font-size="13">dropwheel</text>
  </g>
  <!-- add tile (dashed) -->
  <g transform="translate(158,123)">
    <rect x="-32" y="-32" width="64" height="64" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.4" stroke-dasharray="5 4"/>
    <g stroke="#cdd8e6" stroke-width="2.4" stroke-linecap="round"><line x1="-9" y1="0" x2="9" y2="0"/><line x1="0" y1="-9" x2="0" y2="9"/></g>
    <text x="0" y="50" text-anchor="middle" fill="#9fb0c2" font-family="Segoe UI, sans-serif" font-size="13">Add</text>
  </g>

  <!-- ==== orb (hub) ==== -->
  <circle cx="280" cy="245" r="34" fill="#4da3ff" fill-opacity="0.16"/>
  <circle cx="280" cy="245" r="24" fill="#1a2230" stroke="#4da3ff" stroke-opacity="0.55" stroke-width="1.4"/>
  <circle cx="280" cy="245" r="9" fill="#4da3ff"/>
  <g fill="#9fc4ff">
    <circle cx="280" cy="221" r="2.4"/><circle cx="280" cy="269" r="2.4"/>
    <circle cx="256" cy="245" r="2.4"/><circle cx="304" cy="245" r="2.4"/>
  </g>
</svg>
