name: Release

# An existing stable vX.Y.Z tag is the release boundary. workflow_dispatch allows a
# failed or missed tag run to be repaired without moving or recreating the tag.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing stable SemVer tag to publish (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-2025
    steps:
      - name: Validate tag format
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)$') {
            throw "Release tag '$env:RELEASE_TAG' is not a stable vX.Y.Z SemVer."
          }

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate release commit and project version
        shell: pwsh
        run: |
          $content = Get-Content -Raw src/Dropwheel/Dropwheel.csproj
          $matches = [regex]::Matches($content, '<Version>([^<]+)</Version>')
          if ($matches.Count -ne 1) {
            throw "Expected exactly one <Version> element; found $($matches.Count)."
          }
          $projectTag = "v$($matches[0].Groups[1].Value)"
          if ($projectTag -ne $env:RELEASE_TAG) {
            throw "Tag '$env:RELEASE_TAG' does not match project version '$projectTag'."
          }

          $tagCommit = (git rev-list -n 1 "refs/tags/$env:RELEASE_TAG").Trim()
          $headCommit = (git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $tagCommit -ne $headCommit) {
            throw "Checkout commit '$headCommit' does not match tag commit '$tagCommit'."
          }

          git fetch origin main --no-tags
          if ($LASTEXITCODE -ne 0) { throw 'Could not fetch origin/main.' }
          git merge-base --is-ancestor $headCommit origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release commit '$headCommit' is not an ancestor of origin/main."
          }

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Dropwheel.slnx --nologo --locked-mode

      - name: Verify runtime baseline
        shell: pwsh
        run: ./scripts/verify-runtime-baseline.ps1

      - name: Test
        run: >-
          dotnet test tests/Dropwheel.Tests/Dropwheel.Tests.csproj
          --nologo --configuration Release --no-restore -warnaserror

      - name: Publish (framework-dependent, single file)
        run: >-
          dotnet publish src/Dropwheel/Dropwheel.csproj
          --nologo --configuration Release --runtime win-x64
          --self-contained false --no-restore -warnaserror
          --output dist-fd

      - name: Publish (self-contained, single file)
        run: >-
          dotnet publish src/Dropwheel/Dropwheel.csproj
          --nologo --configuration Release --runtime win-x64
          --self-contained true --no-restore -warnaserror
          -p:IncludeNativeLibrariesForSelfExtract=true --output dist-sc

      - name: Package and checksum
        shell: pwsh
        run: |
          $fd = "Dropwheel-$env:RELEASE_TAG-win-x64.zip"
          $sc = "Dropwheel-$env:RELEASE_TAG-win-x64-self-contained.zip"
          $checksums = "Dropwheel-$env:RELEASE_TAG-SHA256SUMS.txt"

          Compress-Archive -Path dist-fd/* -DestinationPath $fd
          Compress-Archive -Path dist-sc/* -DestinationPath $sc
          Get-FileHash $fd, $sc -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding utf8NoBOM $checksums

      - name: Create or repair GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            Dropwheel-${{ env.RELEASE_TAG }}-win-x64.zip
            Dropwheel-${{ env.RELEASE_TAG }}-win-x64-self-contained.zip
            Dropwheel-${{ env.RELEASE_TAG }}-SHA256SUMS.txt
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
          make_latest: true
          body: |
            Dropwheel — portable overlay launcher for Windows 10/11 x64 (no installer).
            Download one archive, extract it, and run `Dropwheel.exe`.

            - `Dropwheel-${{ env.RELEASE_TAG }}-win-x64-self-contained.zip` — recommended; no separate .NET installation required
            - `Dropwheel-${{ env.RELEASE_TAG }}-win-x64.zip` — smaller; requires the .NET 10.0.10 Desktop Runtime (x64) or later

            The app is currently unsigned, so Windows SmartScreen may show a warning.
            Use `Dropwheel-${{ env.RELEASE_TAG }}-SHA256SUMS.txt` to verify download integrity.

            Config: `%AppData%\Dropwheel\config.json`
