name: Release

# An existing stable vX.Y.Z tag is the release boundary. workflow_dispatch allows a
# failed or missed tag run to be repaired without moving or recreating the tag.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing stable SemVer tag to publish (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-2025
    steps:
      - name: Validate tag format
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)$') {
            throw "Release tag '$env:RELEASE_TAG' is not a stable vX.Y.Z SemVer."
          }

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release commit and project version
        shell: pwsh
        run: |
          $content = Get-Content -Raw src/Dropwheel/Dropwheel.csproj
          $matches = [regex]::Matches($content, '<Version>([^<]+)</Version>')
          if ($matches.Count -ne 1) {
            throw "Expected exactly one <Version> element; found $($matches.Count)."
          }
          $projectTag = "v$($matches[0].Groups[1].Value)"
          if ($projectTag -ne $env:RELEASE_TAG) {
            throw "Tag '$env:RELEASE_TAG' does not match project version '$projectTag'."
          }

          $tagCommit = (git rev-list -n 1 "refs/tags/$env:RELEASE_TAG").Trim()
          $headCommit = (git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $tagCommit -ne $headCommit) {
            throw "Checkout commit '$headCommit' does not match tag commit '$tagCommit'."
          }

          git fetch origin main --no-tags
          if ($LASTEXITCODE -ne 0) { throw 'Could not fetch origin/main.' }
          git merge-base --is-ancestor $headCommit origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release commit '$headCommit' is not an ancestor of origin/main."
          }

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # actions/setup-dotnet@v6.0.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Dropwheel.slnx --nologo --locked-mode

      - name: Restore pinned release tools
        run: dotnet tool restore --tool-manifest .config/dotnet-tools.json

      - name: Verify runtime baseline
        shell: pwsh
        run: ./scripts/verify-runtime-baseline.ps1

      - name: Test
        run: >-
          dotnet test tests/Dropwheel.Tests/Dropwheel.Tests.csproj
          --nologo --configuration Release --no-restore -warnaserror

      - name: Publish (framework-dependent, single file)
        run: >-
          dotnet publish src/Dropwheel/Dropwheel.csproj
          --nologo --configuration Release --runtime win-x64
          --self-contained false --no-restore -warnaserror
          --output dist-fd

      - name: Publish (self-contained, single file)
        run: >-
          dotnet publish src/Dropwheel/Dropwheel.csproj
          --nologo --configuration Release --runtime win-x64
          --self-contained true --no-restore -warnaserror
          -p:IncludeNativeLibrariesForSelfExtract=true --output dist-sc

      - name: Generate provenance and SBOM
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.Substring(1)
          $provenance = "Dropwheel-$env:RELEASE_TAG-PROVENANCE.json"
          $sbom = "Dropwheel-$env:RELEASE_TAG-SBOM.spdx.json"

          $assets = Get-Content -Raw src/Dropwheel/obj/project.assets.json | ConvertFrom-Json
          $runtimePacks = @(
            $assets.project.frameworks.'net10.0-windows'.downloadDependencies |
              Where-Object name -in @(
                'Microsoft.NETCore.App.Runtime.win-x64',
                'Microsoft.WindowsDesktop.App.Runtime.win-x64'
              ) |
              Sort-Object name |
              ForEach-Object {
                $range = [string] $_.version
                if ($range.Length -lt 5 -or -not $range.StartsWith('[') -or -not $range.EndsWith(']')) {
                  throw "Runtime pack '$($_.name)' has invalid version range '$range'."
                }
                $rangeParts = @($range.Substring(1, $range.Length - 2).Split(',') | ForEach-Object { $_.Trim() })
                if ($rangeParts.Count -ne 2 -or
                    [string]::IsNullOrWhiteSpace($rangeParts[0]) -or
                    -not [string]::Equals($rangeParts[0], $rangeParts[1], [StringComparison]::Ordinal)) {
                  throw "Runtime pack '$($_.name)' must have an exact version range; found '$range'."
                }
                [ordered]@{
                  name = $_.name
                  version = $rangeParts[0]
                }
              }
          )
          if ($runtimePacks.Count -ne 2) {
            throw "Expected exact NETCore and WindowsDesktop runtime packs; found $($runtimePacks.Count)."
          }

          $lockFiles = @(
            'src/Dropwheel/packages.lock.json',
            'tests/Dropwheel.Tests/packages.lock.json'
          ) | ForEach-Object {
            if (-not (Test-Path -LiteralPath $_)) { throw "Missing lock file '$_'." }
            [ordered]@{
              path = $_
              sha256 = (Get-FileHash -LiteralPath $_ -Algorithm SHA256).Hash.ToLowerInvariant()
            }
          }

          $document = [ordered]@{
            schemaVersion = 1
            package = [ordered]@{
              name = 'Dropwheel'
              version = $version
            }
            source = [ordered]@{
              repository = "https://github.com/$env:GITHUB_REPOSITORY"
              commit = (git rev-parse HEAD).Trim()
              tag = $env:RELEASE_TAG
            }
            build = [ordered]@{
              sdkVersion = (dotnet --version).Trim()
              targetFramework = 'net10.0-windows'
              runtimeIdentifier = 'win-x64'
              configuration = 'Release'
              runtimePacks = $runtimePacks
            }
            dependencyLocks = $lockFiles
          }
          $document | ConvertTo-Json -Depth 8 | Set-Content -Encoding utf8NoBOM $provenance

          $sbomInput = Join-Path $PWD 'sbom-input'
          $sbomOutput = Join-Path $PWD 'sbom-output'
          New-Item -ItemType Directory -Path "$sbomInput/fd", "$sbomInput/sc", $sbomOutput | Out-Null
          Copy-Item -Path dist-fd/* -Destination "$sbomInput/fd" -Recurse
          Copy-Item -Path dist-sc/* -Destination "$sbomInput/sc" -Recurse
          dotnet sbom-tool generate `
            -b $sbomInput -bc (Join-Path $PWD 'src/Dropwheel') -m $sbomOutput `
            -pn Dropwheel -pv $version -ps IvanLarinDev -D true
          if ($LASTEXITCODE -ne 0) { throw "SBOM generation failed with exit code $LASTEXITCODE." }

          $generatedSbom = Join-Path $sbomOutput '_manifest/spdx_2.2/manifest.spdx.json'
          if (-not (Test-Path -LiteralPath $generatedSbom)) {
            throw "SBOM generator did not create '$generatedSbom'."
          }
          dotnet sbom-tool validate `
            -b $sbomInput -m (Join-Path $sbomOutput '_manifest') `
            -o (Join-Path $sbomOutput 'validation.json') -mi SPDX:2.2 -n true
          if ($LASTEXITCODE -ne 0) { throw "SBOM validation failed with exit code $LASTEXITCODE." }

          Copy-Item -LiteralPath $generatedSbom -Destination $sbom
          foreach ($required in @($provenance, $sbom)) {
            if ((Get-Item -LiteralPath $required).Length -le 0) {
              throw "Generated release metadata '$required' is empty."
            }
          }

      - name: Package and checksum
        shell: pwsh
        run: |
          $fd = "Dropwheel-$env:RELEASE_TAG-win-x64.zip"
          $sc = "Dropwheel-$env:RELEASE_TAG-win-x64-self-contained.zip"
          $provenance = "Dropwheel-$env:RELEASE_TAG-PROVENANCE.json"
          $sbom = "Dropwheel-$env:RELEASE_TAG-SBOM.spdx.json"
          $checksums = "Dropwheel-$env:RELEASE_TAG-SHA256SUMS.txt"

          Compress-Archive -Path dist-fd/* -DestinationPath $fd
          Compress-Archive -Path dist-sc/* -DestinationPath $sc
          Get-FileHash $fd, $sc, $provenance, $sbom -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding utf8NoBOM $checksums

          $checksumLines = @(Get-Content -LiteralPath $checksums)
          if ($checksumLines.Count -ne 4) {
            throw "Expected checksums for four content assets; found $($checksumLines.Count)."
          }

      - name: Create or repair GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            Dropwheel-${{ env.RELEASE_TAG }}-win-x64.zip
            Dropwheel-${{ env.RELEASE_TAG }}-win-x64-self-contained.zip
            Dropwheel-${{ env.RELEASE_TAG }}-PROVENANCE.json
            Dropwheel-${{ env.RELEASE_TAG }}-SBOM.spdx.json
            Dropwheel-${{ env.RELEASE_TAG }}-SHA256SUMS.txt
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
          make_latest: true
          body: |
            Dropwheel — portable overlay launcher for Windows 10/11 x64 (no installer).
            Download one archive, extract it, and run `Dropwheel.exe`.

            - `Dropwheel-${{ env.RELEASE_TAG }}-win-x64-self-contained.zip` — recommended; no separate .NET installation required
            - `Dropwheel-${{ env.RELEASE_TAG }}-win-x64.zip` — smaller; requires the .NET 10.0.10 Desktop Runtime (x64) or later
            - `Dropwheel-${{ env.RELEASE_TAG }}-PROVENANCE.json` — exact source, SDK, runtime, RID, and lock-file identities
            - `Dropwheel-${{ env.RELEASE_TAG }}-SBOM.spdx.json` — SPDX software bill of materials

            The app is currently unsigned, so Windows SmartScreen may show a warning.
            Use `Dropwheel-${{ env.RELEASE_TAG }}-SHA256SUMS.txt` to verify download integrity.

            Config: `%AppData%\Dropwheel\config.json`
