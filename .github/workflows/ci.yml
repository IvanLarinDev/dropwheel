name: CI

# Build + unit tests + Windows integration smoke + publish on every PR and push to main.
# Actions are pinned to full commit SHAs; trailing comments document the corresponding tags.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-smoke:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # actions/setup-dotnet@v6.0.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Dropwheel.slnx --nologo --locked-mode

      - name: Verify runtime baseline
        shell: pwsh
        run: ./scripts/verify-runtime-baseline.ps1

      - name: Unit tests
        run: >-
          dotnet test tests/Dropwheel.Tests/Dropwheel.Tests.csproj
          --nologo --configuration Release --no-restore -warnaserror
          --filter "Category!=WindowsIntegration"

      - name: Windows integration smoke
        run: >-
          dotnet test tests/Dropwheel.Tests/Dropwheel.Tests.csproj
          --nologo --configuration Release --no-build -warnaserror
          --filter "Category=WindowsIntegration"

      - name: Publish framework-dependent executable
        run: >-
          dotnet publish src/Dropwheel/Dropwheel.csproj
          --nologo --configuration Release --runtime win-x64 --no-restore
          --self-contained false -warnaserror
          -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false
          --output artifacts/smoke

      - name: Verify published executable
        shell: pwsh
        run: |
          if (-not (Test-Path "artifacts/smoke/Dropwheel.exe")) {
            throw "Framework-dependent publish did not produce Dropwheel.exe"
          }
